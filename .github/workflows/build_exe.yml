name: Build PyExplorer Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione Librerie
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 paramiko pyinstaller requests

    - name: Creazione EXE con PyInstaller
      run: |
        # Usiamo pyinstaller ignorando l'icona se non esiste per evitare il crash
        pyinstaller --onefile --noconsole --name=PyExplorer PyExplorer.py
      # Se vuoi l'icona, assicurati di aver caricato icon.png e aggiungi --icon=icon.png sopra

    - name: Archiviazione Risultato
      uses: actions/upload-artifact@v4
      with:
        name: PyExplorer-Windows-Binary
        path: dist/PyExplorer.exe
