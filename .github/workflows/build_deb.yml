name: Build PyExplorer Debian Package

on:
  push:
    branches: [ main ]

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Installazione Python e dipendenze di sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip python3-dev build-essential binutils
        python3 -m pip install --upgrade pip
        pip install PyQt6 paramiko pyinstaller requests

    - name: Creazione Eseguibile Linux
      run: |
        # Crea un eseguibile Linux standalone
        pyinstaller --onefile --windowed --name=pyexplorer PyExplorer.py

    - name: Preparazione Struttura Debian
      run: |
        # Crea la struttura delle cartelle per il pacchetto .deb
        mkdir -p pkg/usr/bin
        mkdir -p pkg/usr/share/applications
        mkdir -p pkg/usr/share/pixmaps
        mkdir -p pkg/DEBIAN

        # Copia l'eseguibile
        cp dist/pyexplorer pkg/usr/bin/

        # Copia l'icona
        cp icon.png pkg/usr/share/pixmaps/pyexplorer.png

        # Crea il file di controllo (metadata del pacchetto)
        cat <<EOF > pkg/DEBIAN/control
        Package: pyexplorer
        Version: 1.0.2
        Section: utils
        Priority: optional
        Architecture: amd64
        Maintainer: Enrico Martini <enkas79>
        Description: Remote file explorer for Raspberry Pi.
        EOF

        # Crea il file .desktop per il menu applicazioni
        cat <<EOF > pkg/usr/share/applications/pyexplorer.desktop
        [Desktop Entry]
        Name=PyExplorer
        Exec=/usr/bin/pyexplorer
        Icon=/usr/share/pixmaps/pyexplorer.png
        Type=Application
        Categories=Utility;Development;
        Terminal=false
        EOF

    - name: Generazione pacchetto .deb
      run: |
        dpkg-deb --build pkg pyexplorer_1.0.2_amd64.deb

    - name: Archiviazione Risultato
      uses: actions/upload-artifact@v4
      with:
        name: PyExplorer-Debian-Package
        path: pyexplorer_1.0.2_amd64.deb
