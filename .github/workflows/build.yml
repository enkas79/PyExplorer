name: Build PyExplorer (Windows & Linux)

on:
  push:
    branches: [ main ]
    paths:
      - 'version.txt' # Il server partirà SOLO se viene modificato questo file
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # JOB 1: BUILD PER WINDOWS (.exe con Installer)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Leggi la versione da version.txt
      shell: bash
      run: |
        VERSION=$(cat version.txt)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione Librerie
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 paramiko pyinstaller requests

    - name: Creazione Cartella Eseguibile (PyInstaller)
      shell: bash
      run: |
        ICON_ARGS=""
        if [ -f "icon.ico" ]; then
          ICON_ARGS="--icon=icon.ico --add-data icon.ico;."
          echo "Trovata icon.ico: la includo nella build."
        else
          echo "Nessuna icona trovata: eseguo la build standard senza icona."
        fi
        pyinstaller --onedir --noconsole --name=PyExplorer $ICON_ARGS --add-data "version.txt;." PyExplorer.py

    - name: Creazione script Inno Setup (.iss)
      run: |
        $iconLine = ""
        if (Test-Path "icon.ico") {
            $iconLine = "SetupIconFile=icon.ico"
        }

        $issContent = @"
        [Setup]
        AppName=PyExplorer
        AppVersion=$env:VERSION
        AppPublisher=Enrico Martini
        DefaultDirName={autopf}\PyExplorer
        DefaultGroupName=PyExplorer
        OutputDir=Output_Installer
        OutputBaseFilename=PyExplorer_Setup_v$env:VERSION
        Compression=lzma2
        SolidCompression=yes
        PrivilegesRequired=admin
        $iconLine

        [Files]
        Source: "dist\PyExplorer\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

        [Icons]
        Name: "{group}\PyExplorer"; Filename: "{app}\PyExplorer.exe"; IconFilename: "{app}\PyExplorer.exe"
        Name: "{autodesktop}\PyExplorer"; Filename: "{app}\PyExplorer.exe"; IconFilename: "{app}\PyExplorer.exe"
        "@
        Set-Content -Path "setup_config.iss" -Value $issContent

    - name: Compilazione Installer (Inno Setup)
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup_config.iss

    - name: Pubblica la Release su GitHub (Windows)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: PyExplorer v${{ env.VERSION }}
        body: "Nuovo aggiornamento di PyExplorer rilasciato. Scarica l'installer per Windows o il pacchetto per Linux!"
        files: Output_Installer/PyExplorer_Setup_v${{ env.VERSION }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ==========================================
  # JOB 2: BUILD PER LINUX (.deb in /opt/)
  # ==========================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Leggi la versione da version.txt
      shell: bash
      run: |
        VERSION=$(cat version.txt)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Installazione dipendenze di sistema (Debian/Ubuntu)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick dpkg-dev

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione Librerie
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 paramiko pyinstaller requests

    - name: Creazione Eseguibile Linux (PyInstaller)
      shell: bash
      run: |
        ICON_ARGS=""
        if [ -f "icon.ico" ]; then
          # Nota: Su Linux si usa i due punti ':' per separare i path in --add-data
          ICON_ARGS="--icon=icon.ico --add-data icon.ico:."
          echo "Trovata icon.ico: la includo nella build."
        else
          echo "Nessuna icona trovata: eseguo la build standard senza icona."
        fi
        pyinstaller --onedir --noconsole --name=PyExplorer $ICON_ARGS --add-data "version.txt:." PyExplorer.py

    - name: Impacchettamento nel formato Debian (.deb)
      shell: bash
      run: |
        VERSION=${{ env.VERSION }}
        DEB_DIR="PyExplorer_v${VERSION}_amd64"
        
        # 1. Crea la struttura delle cartelle standard di Linux
        mkdir -p $DEB_DIR/DEBIAN
        mkdir -p $DEB_DIR/opt/PyExplorer
        mkdir -p $DEB_DIR/usr/share/applications

        # 2. Copia l'applicazione dentro /opt/
        cp -r dist/PyExplorer/* $DEB_DIR/opt/PyExplorer/
        chmod +x $DEB_DIR/opt/PyExplorer/PyExplorer

        # 3. Crea il file 'control' necessario al package manager APT/dpkg
        cat <<EOF > $DEB_DIR/DEBIAN/control
        Package: pyexplorer
        Version: ${VERSION}
        Section: utils
        Priority: optional
        Architecture: amd64
        Maintainer: Enrico Martini
        Description: Remote file explorer for Raspberry Pi.
        EOF

        # 4. Gestione dinamica dell'icona per Linux
        ICON_LINE=""
        if [ -f "icon.ico" ]; then
          mkdir -p $DEB_DIR/usr/share/icons/hicolor/256x256/apps
          convert icon.ico[0] -resize 256x256 $DEB_DIR/usr/share/icons/hicolor/256x256/apps/pyexplorer.png || true
          ICON_LINE="Icon=pyexplorer"
        fi

        # 5. Crea il file .desktop per farlo comparire nel menu delle applicazioni
        cat <<EOF > $DEB_DIR/usr/share/applications/pyexplorer.desktop
        [Desktop Entry]
        Version=${VERSION}
        Name=PyExplorer
        Comment=Remote file explorer for Raspberry Pi
        Exec=/opt/PyExplorer/PyExplorer
        ${ICON_LINE}
        Terminal=false
        Type=Application
        Categories=Utility;Development;
        EOF

        # 6. Compila finalmente il pacchetto .deb
        dpkg-deb --build $DEB_DIR

    - name: Pubblica la Release su GitHub (Linux)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        files: PyExplorer_v${{ env.VERSION }}_amd64.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
